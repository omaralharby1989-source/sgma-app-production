openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SGMA APP2 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: member
    description: Member operations
  - name: public
    description: Public operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Account or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with account/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account suspended or role mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /member/profile:
    get:
      operationId: getMemberProfile
      tags: [member]
      summary: Get current member profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMemberProfile
      tags: [member]
      summary: Update member profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /member/password:
    patch:
      operationId: updateMemberPassword
      tags: [member]
      summary: Change member password
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdate"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /member/avatar:
    post:
      operationId: uploadMemberAvatar
      tags: [member]
      summary: Upload member profile avatar (base64)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUpload"
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /member/stats:
    get:
      operationId: getMemberStats
      tags: [member]
      summary: Get member stats summary
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Member stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /developer-info:
    get:
      operationId: getDeveloperInfo
      tags: [public]
      summary: Get developer/app information
      responses:
        "200":
          description: Developer info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperInfo"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SignupInput:
      type: object
      required:
        [
          fullName,
          account,
          email,
          password,
          birthDate,
          address,
          phone,
          whatsapp,
          professionGroup,
          specialtyText,
        ]
      properties:
        fullName:
          type: string
          minLength: 2
        account:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        birthDate:
          type: string
          minLength: 1
          description: Date in YYYY-MM-DD format
        address:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        whatsapp:
          type: string
          minLength: 1
        professionGroup:
          type: string
          minLength: 1
        specialtyText:
          type: string
          minLength: 1

    LoginInput:
      type: object
      required: [identifier, password, role]
      properties:
        identifier:
          type: string
          description: Username (account) or email
        password:
          type: string
        role:
          type: string
          enum: [MEMBER, MODERATOR, ADMIN, SUPER_ADMIN]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/MemberProfile"

    MemberProfile:
      type: object
      required: [id, account, email, fullName, role, status, isDeveloper, isActive, createdAt]
      properties:
        id:
          type: integer
        account:
          type: string
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [MEMBER, MODERATOR, ADMIN, SUPER_ADMIN]
        status:
          type: string
          enum: [PENDING, ACTIVE, SUSPENDED]
        isDeveloper:
          type: boolean
        isActive:
          type: boolean
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        birthDate:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        professionGroup:
          type: ["string", "null"]
        specialtyText:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    MemberProfileUpdate:
      type: object
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        birthDate:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        professionGroup:
          type: ["string", "null"]
        specialtyText:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]

    PasswordUpdate:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    AvatarUpload:
      type: object
      required: [imageData]
      properties:
        imageData:
          type: string
          description: Base64 encoded image data URI

    AvatarResponse:
      type: object
      required: [avatarUrl]
      properties:
        avatarUrl:
          type: string

    MemberStats:
      type: object
      required: [memberSince, daysActive, profileCompleteness, role]
      properties:
        memberSince:
          type: string
          format: date-time
        daysActive:
          type: integer
        profileCompleteness:
          type: integer
          description: Percentage 0-100
        role:
          type: string
        status:
          type: string

    DeveloperInfo:
      type: object
      required: [appName, version, developer, description, contact]
      properties:
        appName:
          type: string
        version:
          type: string
        developer:
          type: string
        description:
          type: string
        contact:
          type: string
        builtWith:
          type: array
          items:
            type: string
