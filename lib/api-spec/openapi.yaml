components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ChatMessage:
      type: object
      required: [id, content, senderId, senderName, senderRole, isDeleted, isMine, createdAt]
      properties:
        id:
          type: integer
        content:
          type: string
        senderId:
          type: integer
        senderName:
          type: string
        senderRole:
          type: string
        senderAvatarUrl:
          type: ["string", "null"]
        isDeleted:
          type: boolean
        isMine:
          type: boolean
          description: True when the authenticated user is the sender
        canModerate:
          type: boolean
          description: True when the authenticated user may delete this message
        editedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    AdminConversation:
      type: object
      required: [userId, fullName, role, lastMessageAt]
      properties:
        userId:
          type: integer
        fullName:
          type: string
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: string
          format: date-time

    SendChatMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000

    SendAdminChatMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        recipientId:
          type: integer
          description: Required for staff replies; ignored for members

    NewsItem:
      type: object
      required: [id, title, content, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: ["string", "null"]
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        status:
          type: string
          enum: [DRAFT, PUBLISHED, ARCHIVED]
        authorId:
          type: ["integer", "null"]
        publishedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NewsListResponse:
      type: array
